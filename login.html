<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión en Yakualarma</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<section id="login">
    <div class="left">

        <h2>BIENVENIDOS A</h2>

        <div class="logo-titulo">
        <img src="imagenes/logo1.PNG" class="logo">
        <h1>YAKU<span>ALARMA</span></h1>
        </div>

        <p>
            Inicia sesión para acceder a todas nuestras funciones para ayudar a tu comunidad
        </p>

        <form action="inicio.html" method="post">

            <label>Correo electrónico</label>
            <input type="email" placeholder="Ingresa tu correo electrónico" required>

            <label>Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña" required>

            <div class="opciones">

                <div>
                    <input type="checkbox" id="recordar">
                    <label for="recordar">Recordar</label>
                </div>

                <a href="#">¿Has olvidado la contraseña?</a>

            </div>

            <button type="submit">Ingresar</button>

        </form>

        <div class="registro">
            <p>¿Necesitas una cuenta? <a href="register.html">Registrarse</a></p>
        </div>
    </div>
    <div class="right"></div>
</section>
</body>
</html>
